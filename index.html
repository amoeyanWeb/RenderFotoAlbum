<!DOCTYPE html>
<html lang="tr" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anı Albümü — Giriş</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Vazirmatn:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <style>
      /* ── Login Page Full Screen ── */
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #3a2a1a 0%, #5a3e28 50%, #7a5838 100%);
        font-family: 'Vazirmatn', 'Playfair Display', serif;
        min-height: 100vh;
      }

      .login-gateway {
        background: rgba(255, 252, 248, 0.97);
        border-radius: 18px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 380px;
        text-align: center;
        animation: fadeInUp 0.5s ease;
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .login-logo {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 1rem;
        border: 3px solid #c8923a;
        opacity: 0.9;
      }

      .login-gateway h1 {
        font-family: 'Playfair Display', serif;
        font-size: 1.6rem;
        color: #3a2a1a;
        margin: 0 0 0.3rem;
      }

      .login-gateway p {
        color: #7a5838;
        font-size: 0.9rem;
        margin: 0 0 1.6rem;
      }

      .lang-selector {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 1.4rem;
      }

      .lang-opt {
        padding: 6px 14px;
        border-radius: 99px;
        border: 1.5px solid #c8923a;
        background: transparent;
        color: #7a5838;
        font-size: 0.82rem;
        cursor: pointer;
        font-family: inherit;
        transition: 0.2s;
      }

      .lang-opt.active,
      .lang-opt:hover {
        background: #c8923a;
        color: #fff;
      }

      .lg-field {
        text-align: left;
        margin-bottom: 1rem;
      }

      .lg-field label {
        display: block;
        font-size: 0.8rem;
        color: #7a5838;
        font-weight: 600;
        margin-bottom: 4px;
        letter-spacing: 0.02em;
      }

      .lg-field input {
        width: 100%;
        padding: 10px 14px;
        border: 1.5px solid #ddd0c0;
        border-radius: 8px;
        font-family: inherit;
        font-size: 0.95rem;
        color: #3a2a1a;
        background: #fdf8f3;
        box-sizing: border-box;
        transition: border-color 0.2s;
        outline: none;
      }

      .lg-field input:focus {
        border-color: #c8923a;
        background: #fff;
      }

      .lg-err {
        color: #c0392b;
        font-size: 0.83rem;
        min-height: 1.2em;
        margin-bottom: 0.8rem;
        text-align: center;
      }

      .lg-btn {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #c8923a, #a06828);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-family: inherit;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.1s;
        letter-spacing: 0.03em;
      }

      .lg-btn:hover { opacity: 0.9; }
      .lg-btn:active { transform: scale(0.98); }
      .lg-btn:disabled { opacity: 0.6; cursor: default; }

      .lang-flag-btns {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 1.4rem;
      }

      .lang-flag-btns button {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 2px solid transparent;
        padding: 0;
        overflow: hidden;
        cursor: pointer;
        background: none;
        transition: border-color 0.2s, transform 0.15s;
        opacity: 0.75;
      }

      .lang-flag-btns button:hover,
      .lang-flag-btns button.active-lang {
        border-color: #c8923a;
        opacity: 1;
        transform: scale(1.1);
      }

      .lang-flag-btns button svg {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div class="login-gateway">
      <img src="./pics/tac.png" class="login-logo" alt="Logo" onerror="this.style.display='none'" />
      <h1><em>Anıların Hazinesi</em></h1>
      <p id="lgSubtitle">Albüme erişmek için giriş yapın</p>

      <div class="lg-field">
        <label id="lgUserLabel">Kullanıcı Adı</label>
        <input type="text" id="lgUser" placeholder="g..." autocomplete="off" />
      </div>
      <div class="lg-field">
        <label id="lgPassLabel">Şifre</label>
        <input
          type="password"
          id="lgPass"
          placeholder="k•••••"
          autocomplete="current-password"
          onkeydown="if(event.key==='Enter') doLogin()"
        />
      </div>

      <div class="lg-err" id="lgErr"></div>

      <button class="lg-btn" id="lgBtn" onclick="doLogin()">Sisteme Giriş</button>

      <!-- Dil seçimi -->
      <div class="lang-flag-btns" title="Giriş sonrası dil seçin">
        <button id="btnTR" class="active-lang" title="Türkçe" onclick="setTargetLang('TR')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
            <rect width="900" height="600" fill="#E30A17"/>
            <circle cx="341" cy="300" r="120" fill="#fff"/>
            <circle cx="376" cy="300" r="97" fill="#E30A17"/>
            <polygon points="583,300 469.4,340.5 502.4,224.1 502.4,375.9 469.4,259.5" fill="#fff"/>
          </svg>
        </button>
        <button id="btnFA" title="فارسی" onclick="setTargetLang('FA')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
            <rect width="900" height="600" fill="#239f40"/>
            <rect y="200" width="900" height="200" fill="#ffffff"/>
            <rect y="400" width="900" height="200" fill="#da0000"/>
            <text x="450" y="330" font-size="80" text-anchor="middle" fill="#da0000" font-family="serif">☀</text>
          </svg>
        </button>
        <button id="btnEN" title="English" onclick="setTargetLang('EN')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30">
            <rect width="60" height="30" fill="#012169"/>
            <path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/>
            <path d="M0,0 L60,30 M60,0 L0,30" stroke="#C8102E" stroke-width="4"/>
            <path d="M30,0 V30 M0,15 H60" stroke="#fff" stroke-width="10"/>
            <path d="M30,0 V30 M0,15 H60" stroke="#C8102E" stroke-width="6"/>
          </svg>
        </button>
      </div>
    </div>

    <script>
      // ── Firebase init ──
      const firebaseConfig = {
        apiKey: "AIzaSyCNetG7kzLaOiX1PF93tx1B7nLWm-2By_8",
        authDomain: "fotoalbum-ac441.firebaseapp.com",
        databaseURL: "https://fotoalbum-ac441-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "fotoalbum-ac441",
        storageBucket: "fotoalbum-ac441.firebasestorage.app",
        messagingSenderId: "547954410485",
        appId: "1:547954410485:web:2f3a1b4c90f5d7bdf8d6bc",
      };
      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

      const FUNCTIONS_BASE_URL =
        window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
          ? "http://localhost:3000"
          : `${window.location.protocol}//${window.location.host}`;

      // ── Eğer daha önce giriş yapıldıysa direkt hedef sayfaya git ──
      (function checkAlreadyLoggedIn() {
        if (sessionStorage.getItem("initialLoggedIn") === "true") {
          const lang = sessionStorage.getItem("albumLang") || "TR";
          redirectToAlbum(lang);
        }
      })();

      // ── Çeviri tablosu ──
      const I18N = {
        TR: {
          dir: "ltr",
          title: "Anıların Hazinesi",
          subtitle: "Albüme erişmek için giriş yapın",
          userLabel: "Kullanıcı Adı",
          userPlaceholder: "g...",
          passLabel: "Şifre",
          passPlaceholder: "k•••••",
          btnLogin: "Sisteme Giriş",
          btnLoading: "⏳ Kontrol ediliyor...",
          errEmpty: "Lütfen tüm alanları doldurun",
          errServer: "❌ Sunucuya bağlanılamadı",
          errWrong: "Kullanıcı adı veya şifre hatalı",
          flagHint: "Giriş sonrası dil seçin",
        },
        FA: {
          dir: "rtl",
          title: "گنجینه‌ی خاطرات",
          subtitle: "برای دسترسی به آلبوم وارد شوید",
          userLabel: "نام کاربری",
          userPlaceholder: "گ...",
          passLabel: "رمز عبور",
          passPlaceholder: "ک•••••",
          btnLogin: "ورود به سیستم",
          btnLoading: "⏳ در حال بررسی...",
          errEmpty: "لطفاً همه‌ی فیلدها را پر کنید",
          errServer: "❌ اتصال به سرور ممکن نیست",
          errWrong: "نام کاربری یا رمز عبور اشتباه است",
          flagHint: "زبان را انتخاب کنید",
        },
        EN: {
          dir: "ltr",
          title: "Memory Album",
          subtitle: "Sign in to access the album",
          userLabel: "Username",
          userPlaceholder: "Enter username",
          passLabel: "Password",
          passPlaceholder: "Enter password",
          btnLogin: "Sign In",
          btnLoading: "⏳ Checking...",
          errEmpty: "Please fill in all fields",
          errServer: "❌ Could not connect to server",
          errWrong: "Incorrect username or password",
          flagHint: "Select language",
        },
      };

      // ── Hedef dil seçimi ──
      let targetLang = sessionStorage.getItem("albumLang") || "TR";
      applyLang(targetLang);

      function setTargetLang(lang) {
        targetLang = lang;
        sessionStorage.setItem("albumLang", lang);
        applyLang(lang);
      }

      function applyLang(lang) {
        const t = I18N[lang] || I18N.TR;

        // Yön (RTL/LTR)
        document.documentElement.lang = lang.toLowerCase();
        document.documentElement.dir = t.dir;
        document.querySelector(".login-gateway").style.direction = t.dir;

        // Metinleri güncelle
        document.querySelector("h1 em").textContent = t.title;
        document.getElementById("lgSubtitle").textContent = t.subtitle;
        document.getElementById("lgUserLabel").textContent = t.userLabel;
        document.getElementById("lgUser").placeholder = t.userPlaceholder;
        document.getElementById("lgPassLabel").textContent = t.passLabel;
        document.getElementById("lgPass").placeholder = t.passPlaceholder;

        const btn = document.getElementById("lgBtn");
        if (btn && !btn.disabled) btn.textContent = t.btnLogin;

        const hint = document.querySelector(".lang-flag-btns");
        if (hint) hint.title = t.flagHint;

        // Aktif bayrak
        ["TR", "FA", "EN"].forEach(l => {
          const b = document.getElementById("btn" + l);
          if (b) b.classList.toggle("active-lang", l === lang);
        });
      }

      function redirectToAlbum(lang) {
        const map = { TR: "indexTR.html", FA: "indexFA.html", EN: "indexEN.html" };
        window.location.href = map[lang] || "indexTR.html";
      }

      // ── Giriş ──
      async function doLogin() {
        const u = document.getElementById("lgUser").value.trim();
        const p = document.getElementById("lgPass").value;
        const errEl = document.getElementById("lgErr");
        const btn = document.getElementById("lgBtn");
        const t = I18N[targetLang] || I18N.TR;
        errEl.textContent = "";

        if (!u || !p) {
          errEl.textContent = t.errEmpty;
          return;
        }

        btn.disabled = true;
        btn.textContent = t.btnLoading;
        errEl.textContent = "";

        try {
          const response = await fetch(`${FUNCTIONS_BASE_URL}/secureLogin`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: u, password: p, type: "system" }),
          });

          const result = await response.json();

          if (response.ok && result.success) {
            sessionStorage.setItem("initialLoggedIn", "true");
            sessionStorage.setItem("albumLang", targetLang);
            redirectToAlbum(targetLang);
          } else {
            errEl.textContent = result.error || t.errWrong;
            btn.disabled = false;
            btn.textContent = t.btnLogin;
          }
        } catch (err) {
          errEl.textContent = t.errServer;
          console.error(err);
          btn.disabled = false;
          btn.textContent = t.btnLogin;
        }
      }
    </script>
  </body>
</html>
